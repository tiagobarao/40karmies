<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Battle Roster</title>
<style>
  :root {
    --theme-bg:       #0b1218;
    --theme-card:     #112233;
    --theme-primary:  #0055aa;
    --theme-secondary:#d4af37;
    --theme-accent:   #66ccff;
    --theme-text:     #f0f0f0;
    --theme-text-dim: #aabbee;
    --theme-highlight:#66ccff;
    --theme-special:  #00d9ff;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Roboto, sans-serif;
    background-color: var(--theme-bg);
    color: var(--theme-text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 12px 60px;
  }

  /* ── HEADER ── */
  .page-header {
    width: 100%;
    max-width: 600px;
    text-align: center;
    margin-bottom: 32px;
  }

  .faction-tag {
    display: inline-block;
    background: #221a10;
    border: 1px solid var(--theme-secondary);
    color: #ffeeb0;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 4px;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 800;
    text-transform: uppercase;
    color: var(--theme-text);
    letter-spacing: 4px;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .header-sub {
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--theme-text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .divider {
    width: 100%;
    max-width: 600px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--theme-primary), transparent);
    margin: 0 0 28px;
  }

  /* ── GRID ── */
  .grid-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 600px;
  }

  /* ── ARMY CARD ── */
  .army-card {
    display: flex;
    text-decoration: none;
    background-color: var(--theme-card);
    border: 1px solid var(--theme-primary);
    border-left: 3px solid var(--theme-secondary);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    transition: transform 0.1s, border-color 0.2s;
    cursor: pointer;
  }
  .army-card:active { transform: scale(0.99); }
  .army-card:hover  { border-color: var(--theme-accent); border-left-color: var(--theme-secondary); }

  /* Header azul igual ao card-header do Marines */
  .card-header {
    display: flex;
    height: 72px;
    background: linear-gradient(90deg, #000 0%, var(--theme-primary) 120%);
    border-bottom: 1px solid var(--theme-secondary);
    flex: 1;
    align-items: center;
    padding: 0 16px;
    gap: 14px;
  }

  .card-icon {
    width: 48px;
    height: 48px;
    border: 2px solid var(--theme-secondary);
    border-radius: 4px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    flex-shrink: 0;
  }

  .header-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }

  .unit-name {
    font-size: 1.05rem;
    font-weight: 800;
    text-transform: uppercase;
    color: var(--theme-text);
    line-height: 1;
  }

  .unit-sub {
    font-size: 0.7rem;
    color: var(--theme-text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Tags dentro do card */
  .card-body {
    padding: 10px 16px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    border-top: none;
    background: var(--theme-card);
  }

  /* Reutiliza estilo de badge do Marines */
  .tag-unit {
    background: #003366;
    border: 1px solid var(--theme-accent);
    color: #88ccff;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .tag-faction {
    background: #221a10;
    border: 1px solid var(--theme-secondary);
    color: #ffeeb0;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Seta de navegação */
  .card-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    background: linear-gradient(90deg, var(--theme-card), #000);
    color: var(--theme-secondary);
    font-size: 1.1rem;
    flex-shrink: 0;
    border-left: 1px solid var(--theme-primary);
  }

  /* ── PLACEHOLDER ── */
  .army-card.placeholder {
    opacity: 0.3;
    pointer-events: none;
    border-left-color: #334;
  }
  .army-card.placeholder .card-header {
    background: linear-gradient(90deg, #000 0%, #0d1a26 120%);
    border-bottom-color: #334;
  }
  .army-card.placeholder .card-arrow {
    color: #334;
    border-left-color: #334;
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: 48px;
    text-align: center;
  }
  .footer-text {
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--theme-text-dim);
    text-transform: uppercase;
    opacity: 0.5;
  }
  .footer-line {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--theme-primary), transparent);
    margin: 10px auto;
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="faction-tag">Warhammer 40,000 · 10th Edition</div>
  <h1>Battle Roster</h1>
  <div class="header-sub">Adeptus Astartes</div>
</div>

<div class="divider"></div>

<div class="grid-container">

  <!-- Ultramarines -->
  <a class="army-card" href="MarinesV6.1.html">
    <div style="flex:1; display:flex; flex-direction:column;">
      <div class="card-header">
        <div class="card-icon">⚔️</div>
        <div class="header-text">
          <div class="unit-name">Ultramarines <span style="font-size:0.6rem; background:#8b1a1a; color:#ffb3b3; padding:2px 7px; border-radius:3px; font-weight:700; letter-spacing:2px; vertical-align:middle;">V6.1</span></div>
          <div class="unit-sub">Gladius Task Force · 1000 pts</div>
        </div>
      </div>
      <div class="card-body">
        <span class="tag-faction">Imperium · Adeptus Astartes</span>
        <span class="tag-unit">Gladiator Lancer</span>
        <span class="tag-unit">Terminators</span>
        <span class="tag-unit">Ballistus Dread.</span>
      </div>
    </div>
    <div class="card-arrow">▶</div>
  </a>

  <!-- Placeholder -->
  <div class="army-card placeholder">
    <div style="flex:1; display:flex; flex-direction:column;">
      <div class="card-header">
        <div class="card-icon" style="border-color:#334; font-size:1rem; color:#334;">＋</div>
        <div class="header-text">
          <div class="unit-name" style="color:#445;">Próximo Exército</div>
          <div class="unit-sub">Slot disponível</div>
        </div>
      </div>
    </div>
    <div class="card-arrow">▶</div>
  </div>

</div>

<div class="footer">
  <div class="footer-line"></div>
  <div class="footer-text">For the Emperor · In Nomine Imperator</div>
  <div class="footer-line"></div>
</div>

</body>
</html>
